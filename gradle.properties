# --- JVM args for the Gradle daemon ---
# IMPORTANT (this machine only): the default Windows TEMP dir (C:\Users\ADMINI~1\AppData\Local\Temp)
# breaks the JDK's AF_UNIX selector self-pipe -> "Unable to establish loopback connection".
# Redirect the AF_UNIX temp dir to a clean path so Gradle/Kotlin can open NIO selectors.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.net.unixdomain.tmpdir=C:/Users/Administrator/.gradle/afunix

# AGP 8.x officially supports JDK 17. The system default is JDK 23, so pin the daemon to JDK 17.
org.gradle.java.home=C:/Users/Administrator/jdk-17.0.13+11

# Run the Kotlin compiler inside the Gradle daemon (which has the AF_UNIX fix above),
# instead of forking a separate Kotlin daemon that would hit the same loopback error.
kotlin.compiler.execution.strategy=in-process

org.gradle.caching=true
org.gradle.configuration-cache=false
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Project dir (deepseek_安卓) contains non-ASCII chars; allow AGP to proceed.
android.overridePathCheck=true
